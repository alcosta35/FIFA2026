# /etc/nginx/sites-available/wc2026
# Symlink: ln -s /etc/nginx/sites-available/wc2026 /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name wc2026.alcosta-cse.net;

    # Static files (the HTML app)
    root /var/www/wc2026;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Proxy API calls to the Flask server
    location /api/ {
        proxy_pass         http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # Health check (optional)
    location /api/health {
        proxy_pass http://127.0.0.1:5050;
    }
}
